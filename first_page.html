<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CRP June 2026 UI</title>
<style>
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Segoe UI,Arial,sans-serif;overflow:hidden}
body{
background:radial-gradient(circle at top,#ffcf33 0,#8b0000 35%,#180000 100%);
color:#fff}
.bg:before,.bg:after{content:"";position:absolute;inset:-20%;background:
repeating-radial-gradient(circle,rgba(255,199,44,.12) 0 2px,transparent 2px 60px);
animation:spin 30s linear infinite}
.bg:after{animation-direction:reverse;filter:blur(2px);opacity:.6}
@keyframes spin{to{transform:rotate(360deg)}}
.particle{position:absolute;width:6px;height:6px;background:#ffd54d;border-radius:50%;opacity:.6;animation:float 12s linear infinite}
@keyframes float{from{transform:translateY(110vh) scale(.5)}to{transform:translateY(-10vh) scale(1.3)}}
.center{position:relative;z-index:2;height:100%;display:flex;justify-content:center;align-items:center;padding:24px}
.card{
width:min(900px,92vw);
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.18);
backdrop-filter:blur(16px);
border-radius:28px;
padding:48px;
text-align:center;
box-shadow:0 0 40px rgba(255,196,0,.25),0 0 120px rgba(255,0,0,.15);
animation:pop 1s ease}
@keyframes pop{from{opacity:0;transform:translateY(40px) scale(.9)}to{opacity:1;transform:none}}
.logo{font-size:90px;animation:bounce 2.5s ease-in-out infinite}
@keyframes bounce{50%{transform:translateY(-10px)}}
h1{font-size:clamp(28px,5vw,60px);margin:8px 0;text-shadow:0 0 18px gold}
h2{font-weight:300;color:#ffe7a3}
.line{width:220px;height:4px;margin:24px auto;background:linear-gradient(90deg,transparent,#ffd54d,transparent);animation:glow 2s infinite}
@keyframes glow{50%{box-shadow:0 0 20px #ffd54d}}
.btn{
display:inline-block;padding:18px 44px;border-radius:50px;
background:linear-gradient(90deg,#ffc400,#ffdb58);
color:#700;font-weight:700;font-size:22px;border:none;cursor:pointer;
box-shadow:0 0 25px rgba(255,200,0,.6);
transition:.3s}
.btn:hover{transform:scale(1.08);box-shadow:0 0 40px gold}
.subtitle{opacity:.9;letter-spacing:4px}
.footer{margin-top:28px;color:#ffdf8b}
</style>
</head>
<body>
<div class="bg"></div>
<script>
for(let i=0;i<80;i++){
 let d=document.createElement('div');
 d.className='particle';
 d.style.left=Math.random()*100+'vw';
 d.style.animationDuration=(8+Math.random()*10)+'s';
 d.style.animationDelay=(-Math.random()*15)+'s';
 document.body.appendChild(d);
}
</script>
<div class="center">
<div class="card">
<div class="logo">🍟</div>
<div class="subtitle">WELCOME TO</div>
<h1>McDONALD'S<br>SANGANDAAN CALOOCAN</h1>
<div class="line"></div>
<h2>CRP WINNERS • JUNE 2026</h2>
<p>Complete each challenge to unlock every CRP winners.</p>
<a href="q&a.html" class="btn" role="button">START CHALLENGE</a>
<div class="footer">✨ All Heart. All Out. ✨</div>
</div>
</div>
</body></html>
